<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <main class="mx-40 mt-30 rounded-lg border-2 border-black">
        <div class="bg-linear-to-t from-sky-500 to-indigo-500 flex justify-center align-center rounded-t-lg"><h1 class="text-xl p-6 text-white font-bold">News you can trust</h1></div>
        <h3 class=" text-center mt-4 text-lg font-semibold">Stay up to date with the latest!</h3>
        <p class="text-center">Subscribe to our newsletter for the latest news straight into your inbox.</p>
        <form class="flex flex-col items-center gap-4 mt-3" >
            <input type="email" name="" id="" placeholder="your@email.com" class="bg-slate-200 text-center py-1 px-6 rounded placeholder:text-sm">
            <button class="bg-blue-500 py-2 px-15 text-white rounded-full">Subscribe</button>
        </form>
        <p class="text-center pb-4 my-4 text-sm">We value your privacy</p>
    </main>
</body>
</html>
